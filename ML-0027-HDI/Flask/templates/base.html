<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}HDI Predictor{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Source+Sans+3:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="grain"></div>
  <header class="site-header">
    <a href="{{ url_for('home') }}" class="brand">
      <span class="brand-mark">HDI</span>
      <span class="brand-text">Human Development Index</span>
    </a>
    <nav class="site-nav">
      <a href="{{ url_for('home') }}" class="{{ 'active' if request.path == '/' else '' }}">Overview</a>
      <a href="{{ url_for('predict') }}" class="{{ 'active' if request.path == '/predict' else '' }}">Predictor</a>
      <a href="{{ url_for('about') }}" class="{{ 'active' if request.path == '/about' else '' }}">Methodology</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <span>HDI Predictor — Linear Regression model trained on life expectancy, education &amp; income indicators</span>
    <span class="footer-eyebrow">Tier I · Tier II · Tier III · Tier IV</span>
  </footer>
</body>
</html>
